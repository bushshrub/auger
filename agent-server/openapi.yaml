openapi: 3.1.0
info:
  title: Auger Agent API
  version: 0.1.0
paths:
  /sessions:
    get:
      summary: List sessions
      responses:
        "200":
          description: Sessions, including archived sessions
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items: { $ref: "#/components/schemas/Session" }
    post:
      summary: Create a session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSessionRequest" }
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateSessionResponse" }
  /sessions/{id}:
    delete:
      summary: Archive a session
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/SessionId" }]
      responses:
        "204": { description: Session archived }
        "401": { description: Invalid write token }
        "404": { description: Session not found }
  /sessions/{id}/input:
    post:
      summary: Send a user message
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/SessionId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserInputRequest" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "401": { description: Invalid write token }
        "404": { description: Session not found }
  /sessions/{id}/tool:
    post:
      summary: Approve or deny a tool call
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/SessionId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ToolDecisionRequest" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "401": { description: Invalid write token }
        "404": { description: Session not found }
  /sessions/{id}/interrupt:
    post:
      summary: Interrupt in-flight generation or tool execution
      description: >-
        Fire-and-forget; the outcome is observed on the event stream as an
        `interrupted` event (stream interruption) or `tool_call_error` events
        (cancelled tool calls). Ignored if the session is idle.
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/SessionId" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "401": { description: Invalid write token }
        "404": { description: Session not found }
  /sessions/{id}/snapshot:
    get:
      summary: Get a session trace snapshot
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/SessionId" }]
      responses:
        "200":
          description: >-
            Session trace snapshot: the same ordered TraceRecord stream that is
            persisted to trace.jsonl. A turn record carries the conversation
            content; the tool events that occurred during an assistant turn
            follow that turn.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TraceRecord" }
        "401": { description: Invalid read token }
        "404": { description: Session not found }
  /sessions/{id}/events:
    get:
      summary: Subscribe to session events
      description: Each SSE data field contains one JSON object matching SessionEvent.
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/SessionId" }]
      responses:
        "200":
          description: Server-sent event stream
          content:
            text/event-stream:
              schema: { $ref: "#/components/schemas/SessionEvent" }
        "401": { description: Invalid read token }
        "404": { description: Session not found }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    SessionId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
  responses:
    Ok:
      description: Command accepted
      content:
        application/json:
          schema:
            type: object
            required: [status]
            properties: { status: { const: ok } }
  schemas:
    CreateSessionRequest:
      type: object
      properties: { model: { type: [string, "null"] } }
    CreateSessionResponse:
      type: object
      required: [session_id, context_window, tokens]
      properties:
        session_id: { type: string, format: uuid }
        context_window: { type: integer }
        tokens:
          type: object
          required: [read, write]
          properties:
            read: { type: string, format: uuid }
            write: { type: string, format: uuid }
    UserInputRequest:
      type: object
      required: [input]
      properties: { input: { type: string } }
    ToolDecisionRequest:
      type: object
      required: [tool_call_id, approved]
      properties:
        tool_call_id: { type: string }
        approved: { type: boolean }
        message: { type: [string, "null"] }
    ToolCall:
      type: object
      required: [id, name, arguments]
      properties:
        id: { type: string }
        name: { type: string }
        arguments: { type: string }
    Session:
      type: object
      required: [session_id, model, created_at, archived, context_window, tokens]
      properties:
        session_id: { type: string, format: uuid }
        model: { type: string }
        created_at: { type: integer }
        archived: { type: boolean }
        context_window: { type: integer }
        tokens:
          type: object
          properties:
            read: { type: string, format: uuid }
            write: { type: string, format: uuid }
    ModelInfo:
      type: object
      required: [provider, id]
      properties:
        provider: { type: string }
        id: { type: string }
    ToolData:
      oneOf:
        - type: object
          required: [type, text]
          properties:
            type: { const: text }
            text: { type: string }
    InputContent:
      oneOf:
        - type: object
          required: [type, text]
          properties:
            type: { const: text }
            text: { type: string }
        - type: object
          required: [type, tool_call_id, content]
          properties:
            type: { const: tool_result }
            tool_call_id: { type: string }
            content: { type: array, items: { $ref: "#/components/schemas/ToolData" } }
    AssistantContent:
      oneOf:
        - type: object
          required: [type, text]
          properties: { type: { const: reasoning }, text: { type: string } }
        - type: object
          required: [type, text]
          properties: { type: { const: text }, text: { type: string } }
        - type: object
          required: [type, id, name, arguments]
          properties:
            type: { const: tool_call }
            id: { type: string }
            name: { type: string }
            arguments: { type: string, description: JSON-encoded tool arguments }
    TraceRecord:
      description: >-
        One record in the trace stream, discriminated by `kind`. Turns hold the
        conversation; the tool events for an assistant turn follow that turn.
      oneOf:
        - type: object
          required: [kind, version, session_id, root_turn_id, created_at, cwd, model]
          properties:
            kind: { const: session }
            version: { type: integer }
            session_id: { type: string, format: uuid }
            root_turn_id: { type: string, format: uuid }
            created_at: { type: string, format: date-time }
            cwd: { type: string }
            model: { $ref: "#/components/schemas/ModelInfo" }
        - type: object
          required: [kind, type, id, parent_turn_id, timestamp, content]
          properties:
            kind: { const: turn }
            type: { const: input_message }
            id: { type: string, format: uuid }
            parent_turn_id: { type: [string, "null"], format: uuid }
            timestamp: { type: string, format: date-time }
            content: { type: array, items: { $ref: "#/components/schemas/InputContent" } }
        - type: object
          required: [kind, type, id, parent_turn_id, timestamp, status, content]
          properties:
            kind: { const: turn }
            type: { const: assistant_message }
            id: { type: string, format: uuid }
            parent_turn_id: { type: [string, "null"], format: uuid }
            timestamp: { type: string, format: date-time }
            status: { type: string, enum: [completed, interrupted, failed] }
            content: { type: array, items: { $ref: "#/components/schemas/AssistantContent" } }
        - type: object
          required: [kind, type, id, turn_id, parent_event_id, timestamp, tool_call_id, tool_name, arguments]
          properties:
            kind: { const: event }
            type: { const: tool_call_requested }
            id: { type: string, format: uuid }
            turn_id: { type: string, format: uuid }
            parent_event_id: { type: [string, "null"], format: uuid }
            timestamp: { type: string, format: date-time }
            tool_call_id: { type: string }
            tool_name: { type: string }
            arguments: { type: string, description: JSON-encoded tool arguments }
        - type: object
          required: [kind, type, id, turn_id, parent_event_id, timestamp, tool_call_id, decision, source, reason]
          properties:
            kind: { const: event }
            type: { const: tool_authorization }
            id: { type: string, format: uuid }
            turn_id: { type: string, format: uuid }
            parent_event_id: { type: [string, "null"], format: uuid }
            timestamp: { type: string, format: date-time }
            tool_call_id: { type: string }
            decision: { type: string, enum: [approved, denied] }
            source: { type: string, enum: [user, policy] }
            reason: { type: [string, "null"] }
        - type: object
          required: [kind, type, id, turn_id, parent_event_id, timestamp, tool_call_id, content]
          properties:
            kind: { const: event }
            type: { const: tool_call_result }
            id: { type: string, format: uuid }
            turn_id: { type: string, format: uuid }
            parent_event_id: { type: [string, "null"], format: uuid }
            timestamp: { type: string, format: date-time }
            tool_call_id: { type: string }
            content: { type: array, items: { $ref: "#/components/schemas/ToolData" } }
    SessionEvent:
      oneOf:
        - type: object
          required: [type, text]
          properties: { type: { const: text_delta }, text: { type: string } }
        - type: object
          required: [type, text]
          properties: { type: { const: reasoning_delta }, text: { type: string } }
        - allOf:
            - { $ref: "#/components/schemas/ToolCall" }
            - type: object
              properties: { type: { enum: [tool_call, tool_call_complete] } }
        - type: object
          required: [type, tool_calls]
          properties:
            type: { const: tool_consent_required }
            tool_calls: { type: array, items: { $ref: "#/components/schemas/ToolCall" } }
        - type: object
          required: [type, id, result]
          properties:
            type: { const: tool_call_result }
            id: { type: string }
            result: { type: string }
        - type: object
          required: [type, id, error]
          properties:
            type: { const: tool_call_error }
            id: { type: string }
            error: { type: string }
        - type: object
          required: [type]
          properties: { type: { const: interrupted } }
        - type: object
          required: [type]
          properties:
            type: { const: done }
            usage: { type: [object, "null"] }
            stop_reason: { type: [string, "null"] }
        - type: object
          required: [type]
          properties: { type: { const: closed } }
