name: Build and Package

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 24

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rustflags: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            rustflags: ''
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Rust ──────────────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build agent-server
        run: |
          cargo build --release --package agent-server --target ${{ matrix.target }} \
            ${{ matrix.rustflags != '' && format('--rustflags {0}', matrix.rustflags) || '' }}
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Lint Rust (clippy)
        run: |
          cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

      - name: Format check Rust
        run: |
          cargo fmt --check
        continue-on-error: true

      # ── Node / WebUI ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('webui/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install webui dependencies
        run: pnpm install --frozen-lockfile
        working-directory: webui

      - name: Build webui
        run: pnpm build
        working-directory: webui

      - name: Lint WebUI (prettier)
        run: |
          cd webui && pnpm run lint
        continue-on-error: true

      # ── Tests ─────────────────────────────────────────────────────
      - name: Run Rust tests
        run: |
          cargo test --all-features --no-run
        env:
          RUSTFLAGS: -D warnings

      - name: Run WebUI tests
        run: |
          cd webui && pnpm test
        continue-on-error: true

      # ── Package ──────────────────────────────────────────────────
      - name: Create package directory
        run: |
          PKG_DIR="auger-${{ github.sha }}-${{ matrix.target }}"
          mkdir -p "$PKG_DIR"

          # Copy rust binary
          TARGET_BIN="target/${{ matrix.target }}/release/agent-server"
          cp "$TARGET_BIN" "$PKG_DIR/"

          # Copy webui build output
          cp -r webui/build "$PKG_DIR/webui-build"

          # Copy configuration files
          cp agent-server/config.toml "$PKG_DIR/" 2>/dev/null || true
          cp agent-server/provider_config.toml "$PKG_DIR/" 2>/dev/null || true

          echo "PKG_DIR=$PKG_DIR" >> $GITHUB_ENV

      - name: Tar package
        run: |
          tar -czf "${{ env.PKG_DIR }}.tar.gz" "${{ env.PKG_DIR }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auger-${{ matrix.target }}
          path: ${{ env.PKG_DIR }}.tar.gz
          retention-days: 14